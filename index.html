<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Mini Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; background:#f5f6fa; display:flex; justify-content:center }
    .app { width: 20vw; min-width:300px }
    h1 { font-size:14px; text-align:center }
    .card { background:white; padding:8px; border-radius:8px; margin-bottom:8px }
    select, input, button { width:100%; margin-bottom:5px }
    canvas { width:100% !important; height:120px !important }
    ul { font-size:12px; padding-left:15px }
  </style>
</head>
<body>
<div class="app">

<h1>📊 Mini Dashboard</h1>

<div class="card">
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
  <select id="filterPoint"><option value="all">Все точки</option></select>
  <button onclick="processData()">Ок</button>
</div>

<div class="card"><canvas id="chart"></canvas></div>
<div class="card"><b>Категории</b><ul id="catList"></ul></div>
<div class="card"><b>ТОП по категориям</b><ul id="topByCat"></ul></div>
<div class="card"><b>⏰ Время</b><ul id="timeList"></ul></div>

<script>
let rawData=[];

const categories = {
"Блюда":["Фарфале","Спагетти","Плов","Курица","Говядина","Манты","Лагман"],
"Завтраки":["завтрак","омлет","каша","сырники","блины"],
"Салаты":["салат","цезарь","греческий","нисуаз"],
"Супы":["суп","борщ","харчо"],
"Фастфуд":["сэндвич","круассан","чиабатта"],
"Десерты":["торт","чизкейк","трайфл"],
"Напитки":["cola","fanta","sprite","tea","кофе","red bull"],
"Снеки":["lays","tuc","арахис","курт"],
"Рамен":["ramen","big bon","samyang"],
"Фрукты":["яблоко","банан","груша","мандарин"]
};

function getCategory(name){
  name=name.toLowerCase();
  for(const cat in categories){
    if(categories[cat].some(k=>name.includes(k.toLowerCase()))) return cat;
  }
  return 'Прочее';
}

document.getElementById('fileInput').addEventListener('change',e=>{
 const reader=new FileReader();
 reader.onload=e=>{
  const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
  rawData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  fillPoints();
 };
 reader.readAsArrayBuffer(e.target.files[0]);
});

function fillPoints(){
 const sel=document.getElementById('filterPoint');
 sel.innerHTML='<option value="all">Все точки</option>';
 [...new Set(rawData.map(r=>r['Торговая точка']))].forEach(p=>{
  let o=document.createElement('option');o.value=p;o.text=p;sel.appendChild(o);
 });
}

function processData(){
 const point=document.getElementById('filterPoint').value;
 let revenue={},catCount={},prodCat={},timeCat={};

 rawData.forEach(r=>{
  if(point!='all'&&r['Торговая точка']!=point) return;
  let d=new Date(r['Дата / время']);
  let sum=parseFloat(r['Сумма'])||0;
  let hour=d.getHours();
  revenue[hour]=(revenue[hour]||0)+sum;

  let items=(r['Товары']||'').replace(/[\[\]]/g,'').split(',');
  items.forEach(p=>{
    let c=getCategory(p);
    catCount[c]=(catCount[c]||0)+1;

    if(!prodCat[c]) prodCat[c]={};
    prodCat[c][p]=(prodCat[c][p]||0)+1;

    if(!timeCat[c]) timeCat[c]={};
    timeCat[c][hour]=(timeCat[c][hour]||0)+1;
  });
 });

 renderChart(revenue);
 renderList('catList',catCount);
 renderTopCat(prodCat);
 renderTime(timeCat);
}

function renderChart(data){
 new Chart(document.getElementById('chart'),{
  type:'bar',data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}
 });
}

function renderList(id,data){
 let ul=document.getElementById(id);ul.innerHTML='';
 Object.entries(data).forEach(([k,v])=>{
  let li=document.createElement('li');li.textContent=k+': '+v;ul.appendChild(li);
 });
}

function renderTopCat(data){
 let ul=document.getElementById('topByCat');ul.innerHTML='';
 Object.entries(data).forEach(([cat,items])=>{
  let top=Object.entries(items).sort((a,b)=>b[1]-a[1])[0];
  if(top){
    let li=document.createElement('li');
    li.textContent=`${cat}: ${top[0]}`;
    ul.appendChild(li);
  }
 });
}

function renderTime(data){
 let ul=document.getElementById('timeList');ul.innerHTML='';
 Object.entries(data).forEach(([cat,hours])=>{
  let best=Object.entries(hours).sort((a,b)=>b[1]-a[1])[0];
  if(best){
    let li=document.createElement('li');
    li.textContent=`${cat}: ${best[0]}:00`;
    ul.appendChild(li);
  }
 });
}
</script>
</div>
</body>
</html>
